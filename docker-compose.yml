version: '3.8'

services:
  telegram-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telegram-mcp
    # Load environment variables from a .env file in the same directory
    env_file:
      - .env
    # Keep stdin open and allocate a pseudo-TTY, crucial for stdio MCP servers
    stdin_open: true
    tty: true
    # Optional: Uncomment the following lines to mount a local directory
    # for persisting the Telegram session file if NOT using TELEGRAM_SESSION_STRING.
    # Replace './telegram_sessions' with your desired host path.
    # volumes:
    #   - ./telegram_sessions:/app
    restart: unless-stopped

  # Multi-user OAuth+HTTP mode. Opt into this with: docker compose --profile http up
  # The default `telegram-mcp` service above is unaffected and still runs stdio mode.
  telegram-mcp-http:
    profiles: ["http"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telegram-mcp-http
    env_file:
      - .env
    environment:
      - TELEGRAM_MCP_TRANSPORT=http
      - TELEGRAM_MCP_DB_PATH=/app/data/telegram_mcp.db
      # Set these in .env (not hardcoded here): TELEGRAM_MCP_PUBLIC_URL,
      # TELEGRAM_MCP_MASTER_KEY (openssl rand -base64 32).
    ports:
      # Reads TELEGRAM_MCP_HTTP_PORT from .env so host and container ports
      # stay in sync; defaults to 8000 if unset.
      - "${TELEGRAM_MCP_HTTP_PORT:-8000}:${TELEGRAM_MCP_HTTP_PORT:-8000}"
    volumes:
      # Persists linked Telegram accounts + OAuth state across restarts.
      - ./data:/app/data
    restart: unless-stopped
